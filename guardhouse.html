        };

        const handleEditClick = (docId) => {
            const vehicle = allRows.find(v => v.id === docId);
            if (!vehicle) return;

            // Helper to create options and pre-select
            const createOptions = (arr, selected) => {
                if (!arr) return ''; 
                return arr.sort().map(item => `<option value="${item}" ${item === selected ? 'selected' : ''}>${item}</option>`).join('');
            };

            const editFormHTML = document.createElement('div');
            editFormHTML.innerHTML = `
                <form id="edit-vehicle-form" class="space-y-4">
                    <input type="hidden" name="docId" value="${vehicle.id}">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Requester</label>
                        <select name="requester" class="mobile-input" required>
                            <option value="">Select requester...</option>
                            ${createOptions(appSettings.requesters, vehicle.requester)}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Vehicle Number</label>
                        <input type="text" name="vehicleNumber" class="mobile-input uppercase font-mono" value="${formatVehicleNumber(vehicle.vehicleNumber)}" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Owner Name</label>
                        <input type="text" name="ownerName" class="mobile-input" value="${vehicle.ownerName || ''}">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Type</label>
                            <select name="vehicleType" class="mobile-input" required>
                                ${createOptions(appSettings.vehicleTypes, vehicle.vehicleType)}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Location</label>
                            <select name="location" class="mobile-input" required>
                                ${createOptions(appSettings.locations, vehicle.location)}
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Visiting Hours</label>
                        <select name="timeSlot" class="mobile-input" required>
                            <option value="">Select...</option>
                            ${Array.from(new Set([...(appSettings.timeSlots || []), ...(vehicle.timeSlot ? [vehicle.timeSlot] : [])])).map(t => `<option value="${t}" ${t === vehicle.timeSlot ? 'selected' : ''}>${t}</option>`).join('')}
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Entry Date</label>
                            ${dateField('entryDate', formatDate(vehicle.entryDate), { id: 'editEntryDate' })}
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Expiry Date</label>
                            ${dateField('expiryDate', formatDate(vehicle.expiryDate), { id: 'editExpiryDate' })}
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Notes</label>
                        <textarea name="notes" class="mobile-input" rows="2">${vehicle.notes || ''}</textarea>
                    </div>
                    <div class="space-y-2">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" id="editEscortRequired" name="escortRequired" class="mobile-checkbox" ${vehicle.escortRequired ? 'checked' : ''}>
                            <label for="editEscortRequired" class="text-sm font-medium text-slate-300">Escort Required</label>
                        </div>
                        <div id="edit-escort-details" class="${vehicle.escortRequired ? '' : 'hidden'} pl-8">
                            <select name="escortBy" class="mobile-input" ${vehicle.escortRequired ? '' : 'disabled'}>
                                <option value="">Select escort...</option>
                                ${createOptions(appSettings.escortBy, vehicle.escortBy)}
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Approved By</label>
                        <select name="approvedBy" class="mobile-input" required>
                            ${createOptions(appSettings.approvedBy, vehicle.approvedBy)}
                        </select>
                    </div>
                </form>
            `;

            // Attach checkbox logic for the edit form
            setTimeout(() => {
                const cb = document.getElementById('editEscortRequired');
                const det = document.getElementById('edit-escort-details');
                if (cb && det) {
                    cb.addEventListener('change', (e) => {
                        det.classList.toggle('hidden', !e.target.checked);
                        const sel = det.querySelector('select[name="escortBy"]');
                        if (sel) { sel.disabled = !e.target.checked; if (!e.target.checked) sel.value = ''; }
                    });
                }
            }, 0);

            showModal(
                "Edit Vehicle Details",
                editFormHTML,
                async () => {
                    const form = document.getElementById('edit-vehicle-form');
                    if(!form.reportValidity()) return; // Basic HTML validation

                    const data = Object.fromEntries(new FormData(form).entries());
                    const entryDate = parseLocalDate(data.entryDate);
                    const expiryDate = parseLocalDate(data.expiryDate);
                    const isEscortRequired = data.escortRequired === 'on';
                    const cleanVehicleNumber = data.vehicleNumber.replace(/\s/g, '');

                    if(expiryDate < entryDate) {
                        showNotification("Expiry date cannot be before entry date.", "error");
                        return; // Don't close modal
                    }

                    try {
                        await updateDoc(doc(db, DB_COLLECTION, data.docId), {
                            requester: data.requester,
                            vehicleNumber: cleanVehicleNumber,
                            ownerName: data.ownerName || "",
                            vehicleType: data.vehicleType,
                            location: data.location,
                            timeSlot: data.timeSlot,
                            entryDate: Timestamp.fromDate(entryDate),
                            expiryDate: Timestamp.fromDate(expiryDate),
                            notes: data.notes || "",
                            escortRequired: isEscortRequired,
                            escortBy: isEscortRequired ? data.escortBy : "",
                            approvedBy: data.approvedBy || ""
                        });
                        showNotification("Vehicle updated successfully!", "success");
                        hideModal();
                    } catch(e) {
                        console.error(e);
                        showNotification("Error updating vehicle: " + e.message, "error");
                    }
                },
                false // keep open on validation errors
            );
        };

        const handleConfirmDelete = async (docId) => {
            if (!docId) return;
            if (!authUser) {
                showNotification("Authentication error. Please refresh.", "error");
                hideModal();
                return;
            }

            try {
                await deleteDoc(doc(db, DB_COLLECTION, docId));
                showNotification("Vehicle record deleted.", "success");
            } catch (error) {
                console.error("Error deleting document:", error);
                showNotification(`Error: ${error.message}`, "error");
            } finally {
                hideModal();
            }
        };
        
        const handleFormChange = (e) => {
            if (e.target.id === 'batchEscortRequired') {
                const c = document.getElementById('batch-escort-details-container');
                if (c) {
                    c.classList.toggle('hidden', !e.target.checked);
                    const sel = c.querySelector('select[name="escortBy"]');
                    if (sel) { sel.disabled = !e.target.checked; if (!e.target.checked) sel.value = ''; }
                }
                return;
            }
            if (e.target.id === 'escortRequired') {
                const escortContainer = document.getElementById('escort-details-container');
                const escortSelect = document.getElementById('escortBy');
                if (e.target.checked) {
                    escortContainer.classList.remove('hidden');
                    escortSelect.disabled = false;
                    escortSelect.required = true;
                } else {
                    escortSelect.disabled = true;   // hidden field must never block submit
                    escortContainer.classList.add('hidden');
                    escortSelect.required = false;
                    escortSelect.value = '';
                }
            }
        };
        
        // --- Settings Event Handlers ---
        
        const handleSettingAdd = async (e) => {
            e.preventDefault();
            const form = e.target.closest('.setting-add-form');
            if (!form) return;
            if (!authUser) {
                showNotification("Authentication error. Please refresh.", "error");
                return;
            }

            const key = form.key.value;
            const newItemInput = form.newItem;
            const newItem = sanitizeInput(newItemInput.value);

            if (!newItem) return;
            
            if (appSettings[key] && appSettings[key].map(i => i.toLowerCase()).includes(newItem.toLowerCase())) {
                showNotification("This item already exists in the list.", "info");
                return;
            }

            const button = form.querySelector('button[type="submit"]');
            button.disabled = true;

            try {
                await updateDoc(settingsDocRef, {
                    [key]: arrayUnion(newItem)
                });
                showNotification("Item added to settings.", "success");
            } catch (error) {
                console.error("Error adding setting:", error);
                showNotification(`Error: ${error.message}`, "error");
            } finally {
                button.disabled = false;
                newItemInput.value = '';
            }
        };

        const handleSettingDelete = async (e) => {
            const button = e.target.closest('.setting-delete-btn');
            if (!button) return;
            if (!authUser) {
                showNotification("Authentication error. Please refresh.", "error");
                return;
            }
            
            const { key, value } = button.dataset;
            if (!key || !value) return;

            button.disabled = true;
            
            try {
                await updateDoc(settingsDocRef, {
                    [key]: arrayRemove(value)
                });
                showNotification("Item removed from settings.", "success");
            } catch (error) {
                console.error("Error removing setting:", error);
                showNotification(`Error: ${error.message}`, "error");
                button.disabled = false;
            }
        };

        // *** NEW: Batch Delete Logic ***
        const handleBatchDeleteExpired = () => {
            const expiredDocs = allRows.filter(v => getVehicleStatus(v) === 'expired');
            const count = expiredDocs.length;

            if (count === 0) {
                showNotification("No expired vehicles found.", "info");
                return;
            }

            showModal(
                "Delete Expired Vehicles?",
                `Found ${count} expired vehicle records. This will permanently delete them from the database.`,
                async () => {
                    hideModal();
                    try {
                        const batch = writeBatch(db);
                        expiredDocs.forEach(docData => {
                            const docRef = doc(db, DB_COLLECTION, docData.id);
                            batch.delete(docRef);
                        });
                        await batch.commit();
                        showNotification(`Successfully deleted ${count} expired records.`, "success");
                    } catch (error) {
                        console.error("Batch delete error:", error);
                        showNotification(`Batch delete failed: ${error.message}`, "error");
                    }
                }
            );
        };

        // --- Global Event Listeners ---
        
        // --- Backup / Restore handlers ---
        const handleExportBackup = async () => {
            try {
                const data = await exportData();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const d = new Date();
                const stamp = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                a.href = url;
                a.download = `vehicle_clearance_backup_${stamp}.json`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);
                showNotification(`Exported ${data.vehicles.length} vehicle record(s).`, 'success');
            } catch (e) {
                console.error('Export failed:', e);
                showNotification('Export failed: ' + e.message, 'error');
            }
        };

        const handleImportFile = (file) => {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async () => {
                try {
                    const obj = JSON.parse(reader.result);
                    const res = await importData(obj, 'merge');
                    showNotification(`Imported ${res.added} new record(s); ${res.skipped} duplicate(s) skipped.`, 'success');
                } catch (e) {
                    console.error('Import failed:', e);
                    showNotification('Import failed: ' + e.message, 'error');
                }
            };
            reader.onerror = () => showNotification('Could not read the file.', 'error');
            reader.readAsText(file);
        };

        appRoot.addEventListener("click", (e) => {
            handleNavClick(e);
            handleNavDropdownToggle(e);
            handleNavDropdownItemClick(e);
            handleMenuAction(e); // Handles both Edit and Delete
            handleSettingDelete(e);
            handleDropdownClick(e);
            
            const keypadBtn = e.target.closest('.keypad-btn');
            const clearBtn = e.target.id === 'clear-search-btn';
            const exitBtn = e.target.id === 'exit-single-view-btn';
            
            // New Grid View Buttons
            const showAllBtn = e.target.closest('#show-all-btn');
            const backSearchBtn = e.target.id === 'back-to-search-btn';
            const batchDeleteBtn = e.target.closest('#batch-delete-expired-btn');
            const exportBtn = e.target.closest('#export-backup-btn');
            const importBtn = e.target.closest('#import-backup-btn');
            const snapBtn = e.target.closest('#snapshot-now-btn');
            const restoreSnapBtn = e.target.closest('.restore-snapshot-btn');
            if (snapBtn) { handleSnapshotNow(snapBtn); return; }
            if (restoreSnapBtn) { handleRestoreSnapshot(restoreSnapBtn.dataset.snapId); return; }
            const delSnapBtn = e.target.closest('.delete-snapshot-btn');
            if (delSnapBtn) { handleDeleteSnapshot(delSnapBtn.dataset.snapId, delSnapBtn.dataset.snapTs); return; }
            if (e.target.closest('#clear-snapshots-btn')) { handleClearSnapshots(); return; }
            if (e.target.closest('#recover-file-btn')) { document.getElementById('recover-file-input').click(); return; }
            const _shiftLogDate = (days) => {
                const d = parseLocalDate(logDate) || new Date();
                d.setDate(d.getDate() + days);
                logDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                renderDailyLogView();
            };
            if (e.target.closest('#log-prev-day')) { _shiftLogDate(-1); return; }
            if (e.target.closest('#log-next-day')) { _shiftLogDate(1); return; }
            if (e.target.closest('#log-today'))    { logDate = null; renderDailyLogView(); return; }
            // --- Daily Log: mode toggle + date-range presets ---
            const _toISO = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            if (e.target.closest('#log-mode-single')) { logRangeMode = false; renderDailyLogView(); return; }
            if (e.target.closest('#log-mode-range'))  { logRangeMode = true;  renderDailyLogView(); return; }
            if (e.target.closest('#log-range-today')) {
                const d = new Date(); logFromDate = _toISO(d); logToDate = _toISO(d);
                renderDailyLogView(); return;
            }
            if (e.target.closest('#log-range-7')) {
                const s = new Date(); const en = new Date(); en.setDate(en.getDate() + 6);
                logFromDate = _toISO(s); logToDate = _toISO(en);
                renderDailyLogView(); return;
            }
            if (e.target.closest('#log-range-week')) {
                const s = new Date(); const day = (s.getDay() + 6) % 7; // Monday = 0
                s.setDate(s.getDate() - day);
                const en = new Date(s); en.setDate(en.getDate() + 6);
                logFromDate = _toISO(s); logToDate = _toISO(en);
                renderDailyLogView(); return;
            }
            if (e.target.closest('#log-range-month')) {
                const now = new Date();
                const s = new Date(now.getFullYear(), now.getMonth(), 1);
                const en = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                logFromDate = _toISO(s); logToDate = _toISO(en);
                renderDailyLogView(); return;
            }
            if (e.target.closest('#add-mode-single')) { addEntryMode = 'single'; renderViewContent(); return; }
            if (e.target.closest('#add-mode-batch'))  { addEntryMode = 'batch';  renderViewContent(); return; }
            if (e.target.closest('#choose-folder-btn')) {
                chooseBackupFolder()
                    .then(name => { showNotification(`Backup folder set: ${name}. First backup written.`, 'success'); renderDataProtectionPanel(); })
                    .catch(err => { if (err.name !== 'AbortError') showNotification('Could not set folder: ' + err.message, 'error'); });
                return;
            }
            if (e.target.closest('#enable-folder-btn')) {
                enableFolderBackup()
                    .then(ok => { showNotification(ok ? 'Folder backups re-enabled.' : 'Access was not granted.', ok ? 'success' : 'error'); renderDataProtectionPanel(); })
                    .catch(err => showNotification('Failed: ' + err.message, 'error'));
                return;
            }
            if (e.target.closest('#stop-folder-btn')) {
                disableFolderBackup().then(() => { showNotification('Folder backups turned off. Existing files are kept.', 'info'); renderDataProtectionPanel(); });
                return;
            }

            if (exportBtn) {
                handleExportBackup();
            }
            if (importBtn) {
                const inp = document.getElementById('import-file-input');
                if (inp) inp.click();
            }

            if (showAllBtn) {
                isGridView = true;
                renderGridView();
            }
            
            if (backSearchBtn) {
                isGridView = false;
                renderSearchView();
            }

            if (batchDeleteBtn) {
                handleBatchDeleteExpired();
            }

            if (keypadBtn) {
                const searchBox = document.getElementById('searchBox');
                if (!searchBox) return;

                const action = keypadBtn.dataset.action;
                const toggleId = keypadBtn.id;
                
                if (toggleId === 'keypad-toggle-alpha') {
                    keypadMode = 'alpha';
                    const currentSearch = searchBox.value; 
                    renderKeypad(); 
                    document.getElementById('searchBox').value = currentSearch;
                    return;
                }
                if (toggleId === 'keypad-toggle-numeric') {
                    keypadMode = 'numeric';
                    const currentSearch = searchBox.value; 
                    renderKeypad(); 
                    document.getElementById('searchBox').value = currentSearch; 
                    return;
                }
                
                if (action === 'backspace') {
                    // Handle backspace logic while preserving format
                    const clean = searchBox.value.replace(/\s/g, '');
                    const newClean = clean.slice(0, -1);
                    searchBox.value = formatVehicleNumber(newClean);
                } else {
                    const t = keypadBtn.textContent.trim();
                    if (t) {
                        const clean = searchBox.value.replace(/\s/g, '');
                        if (clean.length < 10) {
                            searchBox.value = formatVehicleNumber(clean + t);
                        }
                    }
                }
                applyFilter();
            }
            
            if (clearBtn) {
                handleClearSearch();
            }
            if (exitBtn) {
                handleExitSingleView();
            }
        });
        
        appRoot.addEventListener("change", (e) => {
            if (e.target.id === 'import-file-input') {
                handleImportFile(e.target.files[0]);
                e.target.value = '';
                return;
            }
            if (e.target.id === 'log-date-input') {
                const iso = fromDMY(e.target.value);
                if (iso) { logDate = iso; renderDailyLogView(); }
                return;
            }
            if (e.target.id === 'log-from-input') {
                const iso = fromDMY(e.target.value);
                if (iso) { logFromDate = iso; renderDailyLogView(); }
                return;
            }
            if (e.target.id === 'log-to-input') {
                const iso = fromDMY(e.target.value);
                if (iso) { logToDate = iso; renderDailyLogView(); }
                return;
            }
            if (e.target.id === 'recover-file-input') {
                handleRecoverFile(e.target.files[0]);
                e.target.value = '';
                return;
            }
            handleFormChange(e);
        });
        
        appRoot.addEventListener("submit", (e) => {
            e.preventDefault(); 
            if (e.target.id === 'add-vehicle-form') {
                handleAddVehicle(e);
            } else if (e.target.id === 'batch-add-form') {
                handleBatchSubmit(e);
            } else if (e.target.classList.contains('setting-add-form')) {
                handleSettingAdd(e); 
            }
        });
        
        // --- dd/mm/yyyy date fields: calendar picker + auto-formatting ---
        // Seed the native picker with whatever is already typed, before it opens.
        const _syncNative = (native) => {
            const text = native.closest('.date-field').querySelector('.date-text');
            native.value = fromDMY(text.value) || '';
        };
        document.addEventListener('pointerdown', (e) => {
            if (e.target.classList && e.target.classList.contains('date-native')) _syncNative(e.target);
        });
        document.addEventListener('focusin', (e) => {
            if (e.target.classList && e.target.classList.contains('date-native')) _syncNative(e.target);
        });

        document.addEventListener('change', (e) => {
            if (!e.target.classList || !e.target.classList.contains('date-native')) return;
            const field = e.target.closest('.date-field');
            const text = field.querySelector('.date-text');
            text.value = toDMY(e.target.value);
            text.dispatchEvent(new Event('change', { bubbles: true }));
        });

        document.addEventListener('input', (e) => {
            if (!e.target.classList || !e.target.classList.contains('date-text')) return;
            const el = e.target;
            const digits = el.value.replace(/\D/g, '').slice(0, 8);
            let out = digits;
            if (digits.length > 4) out = `${digits.slice(0,2)}/${digits.slice(2,4)}/${digits.slice(4)}`;
            else if (digits.length > 2) out = `${digits.slice(0,2)}/${digits.slice(2)}`;
            el.value = out;
            if (out.length === 10) el.dispatchEvent(new Event('change', { bubbles: true }));
        });

        modalCancelBtn.addEventListener("click", hideModal);
        modalConfirmBtn.addEventListener("click", () => {
            const cb = confirmCallback;
            // Close first so the dialog never sticks, even if the callback is
            // async or throws. Callbacks read any inputs synchronously up front.
            if (typeof cb === 'function') {
                try { cb(); } catch (err) { console.error('modal action failed', err); }
            }
            if (modalAutoClose) hideModal();
        });

    </script>
</body>
</html>
