<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Vehicle Clearance Admin</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <!-- iOS Safari safe helpers: never put regex literals inside HTML attribute strings -->
    <script>
        var alphaNumRe = /[^A-Z0-9]/g;
        function sanitizeVehicleNum(el) {
            var v = el.value.toUpperCase();
            el.value = v.replace(alphaNumRe, '');
        }
        function uppercaseInput(el) {
            el.value = el.value.toUpperCase();
        }
    </script>
    <style>
        :root {
            --bg-void: #060a12;
            --bg-base: #0a0f1e;
            --bg-surface: #0d1628;
            --bg-elevated: #111b30;
            --bg-card: #131e33;
            --bg-hover: #172340;

        --border-dim: rgba(45, 95, 160, 0.18);
        --border-mid: rgba(56, 120, 200, 0.28);
        --border-bright: rgba(80, 160, 240, 0.45);

        --cyan: #38bdf8;
        --cyan-dim: rgba(56, 189, 248, 0.12);
        --cyan-glow: rgba(56, 189, 248, 0.25);
        --teal: #2dd4bf;
        --amber: #f59e0b;
        --amber-dim: rgba(245, 158, 11, 0.12);
        --red: #f87171;
        --red-dim: rgba(248, 113, 113, 0.12);
        --green: #34d399;
        --green-dim: rgba(52, 211, 153, 0.12);
        --indigo: #818cf8;

        --text-primary: #e2eaf6;
        --text-secondary: #7a90b0;
        --text-muted: #3d5070;
        --text-accent: #38bdf8;

        --font-head: 'Syne', sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
        --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; }

    body {
        font-family: var(--font-body);
        background-color: var(--bg-void);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    /* ── Noise texture overlay ── */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.6;
    }

    /* ── Gradient mesh background ── */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 60% 40% at 10% 0%, rgba(30, 80, 160, 0.12) 0%, transparent 60%),
            radial-gradient(ellipse 40% 30% at 90% 100%, rgba(20, 100, 140, 0.08) 0%, transparent 55%);
        pointer-events: none;
        z-index: 0;
    }

    #app-root, .relative-root { position: relative; z-index: 1; }

    /* ── Typography ── */
    h1, h2, h3, .font-head { font-family: var(--font-head); }
    .font-mono, code, .mono { font-family: var(--font-mono); }

    /* ── Animations ── */
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pulse-ring {
        0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
        70% { box-shadow: 0 0 0 8px rgba(56, 189, 248, 0); }
        100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
    }
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
    }
    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    .animate-fade-in { animation: fadeUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-right { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .spinner { animation: spin 0.8s linear infinite; }
    .pulse-dot { animation: blink 1.8s ease-in-out infinite; }

    /* ── Glass card ── */
    .glass-card {
        background: var(--bg-card);
        border: 1px solid var(--border-dim);
        border-radius: 12px;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .glass-card:hover {
        border-color: var(--border-mid);
        box-shadow: 0 4px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(56,189,248,0.05);
    }

    /* ── Glow border card ── */
    .glow-card {
        background: var(--bg-card);
        border: 1px solid var(--border-mid);
        border-radius: 14px;
        box-shadow: 0 0 0 1px rgba(56,189,248,0.04), 0 8px 32px rgba(0,0,0,0.4);
    }

    /* ── Input styles ── */
    .cmd-input {
        width: 100%;
        background: var(--bg-surface);
        border: 1px solid var(--border-dim);
        border-radius: 8px;
        color: var(--text-primary);
        font-family: var(--font-body);
        font-size: 14px;
        padding: 0.65rem 0.85rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
        -webkit-appearance: none;
    }
    .cmd-input:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 0 3px var(--cyan-glow);
    }
    .cmd-input::placeholder { color: var(--text-muted); }
    .cmd-input option { background: var(--bg-elevated); }

    /* Mobile input override */
    .mobile-input {
        width: 100%;
        max-width: 100%;
        font-size: 16px;
        box-sizing: border-box;
    }

    /* ── Buttons ── */
    .btn-primary {
        background: linear-gradient(135deg, #1d6fb8, #1560a8);
        border: 1px solid rgba(56,189,248,0.3);
        color: white;
        font-family: var(--font-head);
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.03em;
        padding: 0.6rem 1.2rem;
        border-radius: 8px;
        transition: all 0.2s;
        cursor: pointer;
    }
    .btn-primary:hover {
        background: linear-gradient(135deg, #2280d0, #1a6ec0);
        box-shadow: 0 0 20px rgba(56,189,248,0.2);
    }

    .btn-icon {
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px;
        border-radius: 8px;
        border: 1px solid var(--border-dim);
        background: var(--bg-elevated);
        color: var(--text-secondary);
        transition: all 0.2s;
        cursor: pointer;
    }
    .btn-icon:hover {
        border-color: var(--border-bright);
        color: var(--text-primary);
        background: var(--bg-hover);
    }
    .btn-icon.danger:hover {
        border-color: rgba(248,113,113,0.4);
        background: var(--red-dim);
        color: var(--red);
    }
    .btn-icon.accent {
        background: rgba(56,189,248,0.1);
        border-color: rgba(56,189,248,0.25);
        color: var(--cyan);
    }
    .btn-icon.accent:hover {
        background: rgba(56,189,248,0.2);
        box-shadow: 0 0 12px rgba(56,189,248,0.2);
    }

    /* ── Label ── */
    .field-label {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
        display: block;
        margin-bottom: 6px;
    }

    /* ── Badge ── */
    .badge {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 3px 8px;
        border-radius: 4px;
    }
    .badge-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
    .badge-red { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .badge-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
    .badge-cyan { background: var(--cyan-dim); color: var(--cyan); border: 1px solid rgba(56,189,248,0.2); }

    /* ── Header ── */
    .app-header {
        background: rgba(10, 15, 30, 0.85);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-dim);
        position: sticky; top: 0; z-index: 30;
    }

    /* ── Parking lot slot ── */
    .parking-lot {
        transition: all 0.3s ease-in-out;
        border-radius: 3px;
    }

    /* ── Details/Summary ── */
    summary { list-style: none; cursor: pointer; }
    summary::-webkit-details-marker { display: none; }
    details[open] summary .chevron-icon { transform: rotate(90deg); }
    .chevron-icon { transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1); }

    /* ── Scroll ── */
    .horizontal-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .horizontal-scroll::-webkit-scrollbar { display: none; }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 4px; }

    /* ── Modal ── */
    .modal-backdrop {
        position: fixed; inset: 0;
        background: rgba(3, 7, 18, 0.85);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 1.5rem 1rem;
        overflow-y: auto;
        z-index: 50;
    }
    .modal-box {
        width: 100%; max-width: 30rem;
        background: var(--bg-elevated);
        border: 1px solid var(--border-mid);
        border-radius: 16px;
        box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(56,189,248,0.08);
        padding: 1.75rem;
        animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
        margin: auto;
    }

    /* ── Settings panel ── */
    #settings-panel {
        position: fixed; top: 0; right: 0; height: 100%;
        width: 100%; max-width: 22rem;
        background: var(--bg-elevated);
        border-left: 1px solid var(--border-mid);
        z-index: 50;
        display: flex; flex-direction: column;
        box-shadow: -20px 0 60px rgba(0,0,0,0.5);
        animation: slideInRight 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    /* ── Divider ── */
    .divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border-mid), transparent);
        margin: 1rem 0;
    }

    /* ── Parking tab ── */
    .parking-tab-btn {
        font-family: var(--font-head);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
    }

    /* ── Status dot ── */
    .status-online::before {
        content: '';
        display: inline-block;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--green);
        margin-right: 6px;
        animation: blink 2s ease-in-out infinite;
        box-shadow: 0 0 6px var(--green);
    }

    /* ── Login page ── */
    .login-bg {
        background: var(--bg-void);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Date picker fix */
    input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.5) sepia(1) hue-rotate(180deg);
        cursor: pointer;
        opacity: 0.7;
    }

    /* ── Vehicle number ── */
    .vehicle-num {
        font-family: var(--font-mono);
        font-weight: 700;
        font-size: 15px;
        color: var(--text-primary);
        letter-spacing: 0.04em;
    }

    /* ── Section title ── */
    .section-title {
        font-family: var(--font-head);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
    }

    /* ── Tab content animation ── */
    .tab-content { animation: fadeIn 0.2s ease-out; }

    /* ── Mobile layout ── */
    html, body { width: 100%; max-width: 100vw; }
    .mobile-safe-container {
        width: 100%; max-width: 100vw;
        padding-left: 1rem; padding-right: 1rem;
        margin-left: auto; margin-right: auto;
        box-sizing: border-box;
    }
    .mobile-modal {
        position: fixed; inset: 0;
        padding: 1rem; max-height: 100vh;
        overflow-y: auto; display: flex;
        align-items: flex-start; justify-content: center;
        padding-top: 2rem;
    }
    .mobile-modal-content {
        width: 100%; max-width: 28rem;
        max-height: calc(100vh - 4rem);
        overflow-y: auto; margin: 0 auto;
    }

    /* ── Request card ── */
    .request-card {
        background: var(--bg-card);
        border: 1px solid var(--border-dim);
        border-radius: 12px;
        padding: 1rem;
        width: 220px;
        flex-shrink: 0;
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
    }
    .request-card:hover {
        border-color: rgba(245,158,11,0.35);
        background: var(--bg-elevated);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    /* ── Clearance card ── */
    .clearance-card {
        background: var(--bg-card);
        border: 1px solid var(--border-dim);
        border-radius: 12px;
        overflow: hidden;
        transition: border-color 0.2s;
        height: fit-content;
    }
    .clearance-card:hover { border-color: var(--border-mid); }
    .clearance-card summary {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.85rem 1rem;
    }
    .clearance-card summary:hover { background: rgba(255,255,255,0.02); }

    /* ── Parking lot visual ── */
    .lot-empty { background: rgba(255,255,255,0.05); }
    .lot-red { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .lot-white { background: linear-gradient(135deg, #cbd5e1, #94a3b8); }
    .lot-buffer { background: linear-gradient(135deg, #f59e0b, #d97706); }

    /* ── Auth form ── */
    .auth-card {
        background: var(--bg-elevated);
        border: 1px solid var(--border-mid);
        border-radius: 20px;
        padding: 2.5rem;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(56,189,248,0.06);
        animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    /* Checkbox */
    input[type="checkbox"] {
        width: 16px; height: 16px;
        accent-color: var(--cyan);
    }
    
    /* Dark theme for body (overrides tailwind class used in original) */
    .dark-theme-bg { background-color: var(--bg-void); }
</style>

</head>
<body>
    <div id="app-root" class="relative-root"></div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import {
        getAuth, onAuthStateChanged, signInWithEmailAndPassword,
        createUserWithEmailAndPassword, signOut,
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import {
        getFirestore, collection, doc, addDoc, setDoc, deleteDoc,
        onSnapshot, query, Timestamp, getDoc, where, updateDoc, getDocs, orderBy,
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Configuration ---
    const ADMIN_INVITE_CODE = "ADMIN2025";

    let PARKING_ZONES = {
        Red: { name: "Red Zone", allocated: 10, buffer: 5, color: 'red' },
        White: { name: "White Zone", allocated: 10, buffer: 5, color: 'white' },
    };

    const firebaseConfig = {
        apiKey: "AIzaSyC51Zo7V75JjOpLOdusf6ZKUzEG_gqFcV4",
        authDomain: "vehicle-clearance.firebaseapp.com",
        projectId: "vehicle-clearance",
        storageBucket: "vehicle-clearance.appspot.com",
        messagingSenderId: "187403368572",
        appId: "1:187403368572:web:1f94845da67ef0c7ccf1f9"
    };

    const appRoot = document.getElementById("app-root");
    let app, auth, db;
    try {
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
    } catch (err) {
        console.error("Firebase initialization error:", err);
        appRoot.innerHTML = '<div style="padding:2rem;color:#f87171;font-family:monospace;">Firebase init failed. Check console.</div>';
    }

    // --- State ---
    let clearances = [];
    let clearanceRequests = [];
    let vvips = [];
    let parkingAssignments = [];
    let currentAdminProfile = null;
    let unsubClearances = null, unsubRequests = null, unsubVVIPs = null, unsubParking = null, unsubParkingConfig = null;
    let authMode = "login";
    let activeParkingTab = 'Red';
    let selectedParkingDate = new Date();

    // --- Utilities ---
    const isSameDay = (d1, d2) => d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
    const toISODate = d => d ? new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split("T")[0] : "";

    const normalizePhoneNumberForWhatsApp = (phone) => {
        if (!phone || typeof phone !== 'string') return '';
        let cleaned = phone.replace(/\D/g, '');
        if (cleaned.startsWith('60') || cleaned.startsWith('65')) return cleaned;
        if (cleaned.startsWith('0')) return '6' + cleaned;
        if ((cleaned.startsWith('8') || cleaned.startsWith('9')) && cleaned.length === 8) return '65' + cleaned;
        return '60' + cleaned;
    };

    const formatDate = (date) => {
        if (!date) return "N/A";
        const d = date instanceof Date ? date : date.toDate();
        return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getFullYear()).slice(-2)}`;
    };

    const getFormObj = form => Object.fromEntries(new FormData(form).entries());

    const showNotification = (message, type = "success") => {
        const notification = document.createElement("div");
        const colors = {
            success: { bg: 'rgba(16,40,28,0.95)', border: 'rgba(52,211,153,0.3)', icon: '✓', text: '#34d399' },
            error: { bg: 'rgba(40,12,12,0.95)', border: 'rgba(248,113,113,0.3)', icon: '✗', text: '#f87171' },
            info: { bg: 'rgba(10,25,48,0.95)', border: 'rgba(56,189,248,0.3)', icon: 'ℹ', text: '#38bdf8' }
        };
        const c = colors[type] || colors.info;
        notification.style.cssText = `
            position:fixed; bottom:1.5rem; right:1.5rem; z-index:200;
            display:flex; align-items:center; gap:10px;
            padding:12px 18px; border-radius:10px;
            background:${c.bg}; border:1px solid ${c.border};
            box-shadow:0 8px 32px rgba(0,0,0,0.5);
            font-family:'DM Sans',sans-serif; font-size:13px;
            color:#e2eaf6; max-width:320px;
            animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
            backdrop-filter:blur(12px);
        `;
        notification.innerHTML = `<span style="color:${c.text};font-size:16px;flex-shrink:0;">${c.icon}</span><span>${message}</span>`;
        document.body.appendChild(notification);
        setTimeout(() => { notification.style.opacity='0'; notification.style.transition='opacity 0.3s'; setTimeout(()=>notification.remove(),300); }, 3800);
    };

    const parseLocalDate = (dateString) => {
        if (!dateString) return null;
        const [year, month, day] = dateString.split('-').map(p => parseInt(p, 10));
        return isNaN(year) ? null : new Date(year, month - 1, day);
    };

    // --- Email ---
    const generateNotificationEmail = (status, data) => {
        const template = (title, content) => `
        <div style="font-family:'DM Sans',Arial,sans-serif;font-size:15px;line-height:1.6;color:#334155;max-width:580px;margin:20px auto;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;">
            <div style="background:#060a12;padding:24px;text-align:center;">
                <p style="margin:0;font-size:11px;font-family:monospace;letter-spacing:0.2em;color:#38bdf8;text-transform:uppercase;">Vehicle Clearance System</p>
                <h1 style="margin:8px 0 0;font-size:22px;color:#e2eaf6;font-family:'Syne',sans-serif;">${title}</h1>
            </div>
            <div style="padding:28px;background:#ffffff;">${content}</div>
            <div style="background:#f8fafc;padding:14px;text-align:center;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;">Automated notification · Vehicle Clearance System · Do not reply</div>
        </div>`;
        let title='', content='';
        if (status==='pending') {
            title='Request Received';
            content=`<p>Hi <strong>${data.requesterName||'User'}</strong>,</p><p>Your clearance request for <strong style="font-family:monospace;">${data.vehicleNumber}</strong> is now <strong>pending review</strong>. You'll receive an update once it's processed.</p><hr style="border:none;border-top:1px solid #e2e8f0;margin:18px 0;"><p style="font-size:13px;color:#64748b;">Submitted: ${data.submittedAt}</p>`;
        } else if (status==='approved') {
            title='Request Approved ✓';

    const renderParkingMonitor = () => {
        const container = document.getElementById("parking-monitor-section");
        if (!container) return;
        const now = new Date();
        const isToday = isSameDay(selectedParkingDate, now);
        const isOperational = now.getHours() >= 8 && now.getHours() < 19;

        let tabsHTML = '';
        Object.keys(PARKING_ZONES).forEach(zoneKey => {
            const zone = PARKING_ZONES[zoneKey];
            const assigned = parkingAssignments.filter(p => p.parkingZone === zoneKey);
            const forecastCount = assigned.length;
            const isActive = activeParkingTab === zoneKey;
            const isOver = forecastCount > zone.allocated;
            const tabActiveBg = isActive ? 'rgba(56,189,248,0.08)' : 'transparent';
            const tabActiveBorder = isActive ? (zoneKey==='Red'?'rgba(248,113,113,0.5)':'rgba(255,255,255,0.4)') : 'transparent';
            const tabActiveText = isActive ? (zoneKey==='Red'?'#f87171':'#e2eaf6') : '#7a90b0';
            const countBg = isOver ? 'rgba(245,158,11,0.15)' : (isActive ? 'rgba(56,189,248,0.12)' : 'rgba(255,255,255,0.05)');
            const countColor = isOver ? '#f59e0b' : (isActive ? '#38bdf8' : '#7a90b0');

            tabsHTML += `
            <button class="parking-tab-btn" data-zone="${zoneKey}" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;background:${tabActiveBg};border-bottom:2px solid ${tabActiveBorder};color:${tabActiveText};transition:all 0.2s;cursor:pointer;">

                <span style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:${countBg};color:${countColor};">${forecastCount}/${zone.allocated}</span>
            </button>`;
        });

        const activeZone = PARKING_ZONES[activeParkingTab];
        const assignedHere = parkingAssignments.filter(p => p.parkingZone === activeParkingTab);
        const forecastCount = assignedHere.length;
        const availableCount = Math.max(0, activeZone.allocated + activeZone.buffer - forecastCount);
        const bufferUsed = Math.max(0, forecastCount - activeZone.allocated);
        const totalSlots = activeZone.allocated + activeZone.buffer;

        let lotsHTML = '';
        for(let i=1; i<=totalSlots; i++){
            const isOccupied = i <= forecastCount;
            const isBuffer = i > activeZone.allocated;
            let cls = 'lot-empty';
            if(isOccupied) cls = isBuffer ? 'lot-buffer' : (activeParkingTab==='Red' ? 'lot-red' : 'lot-white');
            const vehicle = assignedHere[i-1];
            lotsHTML += `<div class="parking-lot ${cls}" style="height:10px;border-radius:3px;" title="${isOccupied&&vehicle?vehicle.vehicleNumber:'Available'}"></div>`;

                </div>
            </div>

            <div style="display:flex;border-bottom:1px solid var(--border-dim);">${tabsHTML}</div>

            <div class="tab-content" style="padding:16px;">
                ${(isToday && !isOperational) ? `<p style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#f59e0b;text-align:center;margin-bottom:12px;letter-spacing:0.08em;">⚠ OFF-PEAK HOURS — FORECAST VIEW</p>` : ''}

                <div style="display:grid;grid-template-columns:repeat(${Math.min(totalSlots,20)},1fr);gap:3px;margin-bottom:12px;">${lotsHTML}</div>

                <div style="background:var(--bg-surface);border-radius:4px;height:4px;overflow:hidden;margin-bottom:12px;">
                    <div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px;transition:width 0.5s ease;"></div>
                </div>

                <div style="display:flex;justify-content:space-between;align-items:center;">

    // ─────────────────────────────────────────
    //  VVIP LIST
    // ─────────────────────────────────────────
    const renderVVIPListForSettings = () => {

    // ─────────────────────────────────────────
    //  CLEARANCE FORM MODAL
    // ─────────────────────────────────────────
    const inputStyle = `width:100%;background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:7px;color:#e2eaf6;font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;box-sizing:border-box;`;

        const locationOptions = ["Foyer Parking","Basement 1","Basement 2","Basement 3","Basement 4","Courtyard","E3","Other"];

        const selectLocationValue = isStandardLocation ? (data.location || 'PCC') : 'Other';

        const contact = isReview ? data.requesterContact : data.ownerContact;

        const name = isReview ? data.requesterName : data.ownerName;

            actionButtonsHTML = `${whatsAppButton}<button type="button" class="reject-request-btn" style="flex:1;padding:10px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);border-radius:8px;color:#f87171;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.04em;cursor:pointer;" data-id="${data.id}">Reject</button><button type="button" class="approve-request-btn" style="flex:1;padding:10px;background:linear-gradient(135deg,rgba(56,189,248,0.15),rgba(56,189,248,0.08));border:1px solid rgba(56,189,248,0.3);border-radius:8px;color:#38bdf8;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.04em;cursor:pointer;" data-id="${data.id}">Approve</button>`;
        } else {
            actionButtonsHTML = `${whatsAppButton}<button type="button" id="cancel-modal-btn" style="flex:1;padding:10px;background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:8px;color:var(--text-secondary);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">Cancel</button><button type="button" class="save-clearance-btn" style="flex:1;padding:10px;background:linear-gradient(135deg,#1d6fb8,#1254a0);border:1px solid rgba(56,189,248,0.3);border-radius:8px;color:#e2eaf6;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.04em;cursor:pointer;" data-id="${data.id||''}">${mode==='edit'?'Update':'Save'}</button>`;
        }

        const FL = (text) => `<label style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:5px;">${text}</label>`;

        document.getElementById("modal-container").innerHTML = `

            <button id="close-modal-btn" style="position:absolute;top:16px;right:16px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:6px;color:var(--text-secondary);cursor:pointer;">${icons.x}</button>
            <form id="clearance-form" style="display:flex;flex-direction:column;gap:12px;">
                <div style="margin-bottom:4px;">
                    <p style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:rgba(56,189,248,0.5);margin:0 0 2px;">${isReview?'REVIEW':'CLEARANCE'}</p>
                    <h2 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#e2eaf6;margin:0;">${title}</h2>
                </div>
                <input type="hidden" name="id" value="${data.id||''}">

                ${mode!=='review'&&mode!=='edit' ? `
                <div style="display:flex;border:1px solid var(--border-dim);border-radius:8px;overflow:hidden;margin-bottom:2px;">
                    <button type="button" id="single-vehicle-tab" style="flex:1;padding:8px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;border-right:1px solid var(--border-dim);background:rgba(56,189,248,0.1);color:#38bdf8;cursor:pointer;">Single</button>
                    <button type="button" id="batch-vehicle-tab" style="flex:1;padding:8px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:transparent;color:var(--text-muted);cursor:pointer;">Batch</button>

                <div id="batch-vehicle-content" style="display:none;">
                    ${FL('Vehicle Numbers (one per line)')}
                    <textarea name="vehicleNumbers" rows="4" style="${inputStyle}resize:vertical;" placeholder="WXX1234&#10;WYX5678&#10;..." oninput="uppercaseInput(this)"></textarea>

            ${FL('Driver/Owner Name')}
            <input name="ownerName" value="${name||''}" style="${inputStyle};margin-bottom:4px;" required>

            <div>
                ${FL('Host')}
                <select id="host-select" name="host_select" style="${selectStyle}" required>
                    <option value="" style="background:var(--bg-elevated);">Select host...</option>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;">

                <div id="parking-zone-assignment-container">
                    ${FL('Parking Zone')}

                        <option value="" style="background:var(--bg-elevated);" disabled ${!data.parkingZone ? 'selected' : ''}>Select Zone...</option>
                        <option value="Red" style="background:var(--bg-elevated);" ${data.parkingZone==='Red'?'selected':''}>Red Zone</option>
                        <option value="White" style="background:var(--bg-elevated);" ${data.parkingZone==='White'?'selected':''}>White Zone</option>
                    </select>
                </div>

            ${FL('Visiting Hours')}
            <select name="timeSlot" style="${selectStyle}" required>
                ${['08:00-13:00','08:00-18:00','13:00-18:00','18:00-onwards'].map(t=>`<option style="background:var(--bg-elevated);" ${data.timeSlot===t?'selected':''}>${t}</option>`).join('')}
            </select>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <div>${FL('Entry Date')}<input type="date" name="entryDate" value="${toISODate(data.entryDate?.toDate()||new Date())}" style="${inputStyle}"></div>
                <div>${FL('Expiry Date')}<input type="date" name="expiryDate" value="${toISODate(data.expiryDate?.toDate()||new Date())}" style="${inputStyle}"></div>
            </div>

            <div>
                ${FL('Parking Location')}
                <select name="location" style="${selectStyle}" required>
                    <option value="PCC" style="background:var(--bg-elevated);color:var(--text-muted);" ${selectLocationValue==='PCC'?'selected':''}>-- Select Specific Location --</option>
                    ${locationOptions.map(l=>`<option value="${l}" style="background:var(--bg-elevated);" ${selectLocationValue===l?'selected':''}>${l}</option>`).join('')}
                </select>
                <input name="customLocation" value="${customLocationValue}" style="${inputStyle}display:${selectLocationValue==='Other'?'block':'none'};margin-top:8px;" ${selectLocationValue==='Other'?'required':''} placeholder="Enter custom location...">
            </div>

            ${FL('Notes')}
            <textarea name="notes" rows="2" style="${inputStyle}resize:vertical;">${data.notes||''}</textarea>

            <div style="display:flex;align-items:center;gap:8px;padding-top:8px;border-top:1px solid var(--border-dim);">${actionButtonsHTML}</div>

    if (mode==='new') {

        const switchToBatch=()=>{ batchTab.style.background='rgba(56,189,248,0.1)'; batchTab.style.color='#38bdf8'; singleTab.style.background='transparent'; singleTab.style.color='var(--text-muted)'; batchContent.style.display='block'; singleContent.style.display='none'; vehicleNumberInput.required=false; vehicleNumbersTextarea.required=true; };

    });
};

const renderWhatsAppModal = (data) => {
    const contact = data.ownerContact || data.requesterContact;
    if (!contact) { showNotification("No contact number available.", "error"); return; }
    const modalHtml = `
    <div id="whatsapp-modal-backdrop" class="mobile-modal" style="background:rgba(3,7,18,0.85);backdrop-filter:blur(8px);z-index:60;">
    <div class="mobile-modal-content" style="background:var(--bg-elevated);border:1px solid rgba(52,211,153,0.2);border-radius:14px;padding:1.5rem;animation:fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) forwards;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;">
            <span style="color:#34d399;">${icons.whatsapp}</span>

        </div>
        <form id="whatsapp-form" style="display:flex;flex-direction:column;gap:12px;">
            <div>
                <label style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:8px;">Message Type</label>
                <div style="display:flex;flex-direction:column;gap:6px;">
                    ${['approved','rejected','query'].map((t,i)=>`
                    <label style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:7px;cursor:pointer;transition:border-color 0.15s;">
                        <input type="radio" name="messageType" value="${t}" ${i===2?'checked':''} style="accent-color:#38bdf8;width:14px;height:14px;">
                        <span style="font-size:13px;color:var(--text-primary);text-transform:capitalize;">${t}</span>
                    </label>`).join('')}
                </div>
            </div>
            <div>
                <label style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:5px;">Message</label>
                <textarea id="customMessage" name="customMessage" rows="4" style="width:100%;background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:7px;color:#e2eaf6;font-family:'DM Sans',sans-serif;font-size:13px;padding:10px;outline:none;resize:vertical;box-sizing:border-box;"></textarea>
            </div>
            <div style="display:flex;justify-content:flex-end;gap:8px;">
                <button type="button" id="cancel-whatsapp-btn" style="padding:9px 16px;background:var(--bg-surface);border:1px solid var(--border-dim);border-radius:7px;color:var(--text-secondary);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">Cancel</button>
                <button type="submit" style="padding:9px 16px;background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.25);border-radius:7px;color:#34d399;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;cursor:pointer;">${icons.whatsapp} Send</button>
            </div>
        </form>
    </div></div>`;

    document.getElementById("modal-container").innerHTML += modalHtml;
    const form=document.getElementById('whatsapp-form'), textarea=document.getElementById('customMessage');
    const name=data.ownerName||data.requesterName;
    const updateMessage=type=>{ const dateStr=data.entryDate?formatDate(data.entryDate instanceof Date?data.entryDate:data.entryDate.toDate()):'N/A'; if(type==='approved')textarea.value=`Hi ${name}, your vehicle clearance for [${data.vehicleNumber}] is APPROVED, valid on ${dateStr}.`; else if(type==='rejected')textarea.value=`Hi ${name}, your vehicle clearance for [${data.vehicleNumber}] is REJECTED. Please check email for details.`; else textarea.value=`Hi ${name}, regarding your request for [${data.vehicleNumber}], `; };

};

    document.getElementById("modal-container").innerHTML = `

const getCommonPayload = (form) => {
    const data=getFormObj(form); const entryDate=parseLocalDate(data.entryDate), expiryDate=parseLocalDate(data.expiryDate);
    if(!entryDate||!expiryDate||!form.checkValidity()){showNotification("Invalid form data. Fill all required fields.","error");return null;}
    if(!currentAdminProfile){showNotification("Admin profile not loaded.","error");return null;}
    
    let host = data.host_select;
    if (host === 'Others') {
        host = (data.host_other || '').trim();
    }

    let location = data.location;
    if (location === 'Other') {
        location = (data.customLocation || '').trim();
    }
    if(!location || location === 'PCC') {
        showNotification("Please select a specific Parking Location.", "error");
        return null;
    }

    const isBasement = location.includes('Basement');
    const pZone = data.parkingZone || "";

    if(isBasement && !pZone) {
        showNotification("Please select a Parking Zone for Basement locations.", "error");
        return null;
    }

    return { ownerName:data.ownerName, host:host, ownerContact:data.contact, ownerEmail:data.email, vehicleType:data.vehicleType, location:location, timeSlot:data.timeSlot, entryDate:Timestamp.fromDate(entryDate), expiryDate:Timestamp.fromDate(expiryDate), notes:data.notes||"", escortRequired:!!data.escortRequired, parkingZone:pZone, createdAt:Timestamp.now(), approvedAt:Timestamp.now(), approvedByUsername:currentAdminProfile.username };
};

const saveSingleClearance = async (form, editingId=null) => {
    const commonPayload=getCommonPayload(form); if(!commonPayload)return;
    const data=getFormObj(form); const payload={...commonPayload, vehicleNumber:data.vehicleNumber.toUpperCase()};
    if(editingId){ delete payload.createdAt; delete payload.approvedAt; delete payload.approvedByUsername; payload.lastUpdatedAt=Timestamp.now(); payload.lastUpdatedByUsername=currentAdminProfile.username; await updateDoc(doc(db,"vehicleClearances",editingId),payload); showNotification(`Clearance for ${payload.vehicleNumber} updated.`); }
    else { await addDoc(collection(db,"vehicleClearances"),payload); showNotification(`Clearance for ${payload.vehicleNumber} created.`); if(payload.ownerEmail){const emailData={ownerName:payload.ownerName,vehicleNumber:payload.vehicleNumber,location:payload.location,entryDate:formatDate(payload.entryDate),expiryDate:formatDate(payload.expiryDate)}; await sendEmail(payload.ownerEmail,`Vehicle Clearance Approved: ${payload.vehicleNumber}`,generateNotificationEmail('approved',emailData));} }
    document.getElementById('modal-container').innerHTML='';
};

const executeSave = async (form, editingId, isBatchMode, vehicleNumbers) => {
    const saveButton=form.querySelector('.save-clearance-btn');
    if(saveButton){saveButton.disabled=true; saveButton.innerHTML=`<span class="spinner" style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;display:inline-block;margin-right:6px;"></span>Processing...`;}
    if(editingId){await saveSingleClearance(form,editingId);return;}
    if(isBatchMode){
        const data=getFormObj(form); const commonPayload=getCommonPayload(form);
        if(!commonPayload){if(saveButton){saveButton.disabled=false;saveButton.innerHTML='Save';}return;}
        try{ const promises=vehicleNumbers.map(vNum=>addDoc(collection(db,"vehicleClearances"),{...commonPayload,vehicleNumber:vNum.replace(/[^A-Z0-9]/g,'')})); await Promise.all(promises); document.getElementById('modal-container').innerHTML=''; showNotification(`Created ${vehicleNumbers.length} clearance records.`,"success");
        if(commonPayload.ownerEmail){const emailData={ownerName:commonPayload.ownerName,vehicleNumber:vehicleNumbers.join(', '),location:commonPayload.location,entryDate:formatDate(commonPayload.entryDate),expiryDate:formatDate(commonPayload.expiryDate)}; sendEmail(commonPayload.ownerEmail,`Vehicle Clearance Approved: Batch`,generateNotificationEmail('approved',emailData));}
        renderBatchWhatsAppModal(data,vehicleNumbers); }catch(err){showNotification(`Error: ${err.message}`,'error');if(saveButton){saveButton.disabled=false;saveButton.innerHTML='Save';}}

};

const handleSaveClearance = async (form, editingId) => {
    const saveButton=form.querySelector('.save-clearance-btn');
    const isBatchMode=document.getElementById('batch-vehicle-tab')?.style.color==='#38bdf8';
    const data=getFormObj(form);
    
    if(!form.checkValidity()){form.reportValidity();return;}

    let countToAdd=1, vehicleNumbers=[];
    if(isBatchMode&&!editingId){vehicleNumbers=(data.vehicleNumbers||'').split('\n').map(v=>v.trim().toUpperCase()).filter(Boolean);if(!vehicleNumbers.length){showNotification("Enter at least one vehicle number.","error");return;}countToAdd=vehicleNumbers.length;}
    const entryDate=parseLocalDate(data.entryDate);
    
    let locVal = data.location;
    if (locVal === 'Other') { locVal = (data.customLocation || '').trim(); }
    if(!locVal || locVal === 'PCC') { showNotification("Please select a specific Parking Location.", "error"); return; }
    
    const isBasement = locVal.includes('Basement');
    const zone = data.parkingZone || "";
    
    if(isBasement && !zone){ showNotification("Please select a Parking Zone for Basement locations.", "error"); return; }

    if(isBasement && zone && entryDate){
        try{
            if(saveButton){saveButton.disabled=true;saveButton.innerHTML='Checking...';}
            const maxZoneCapacity=(parseInt(PARKING_ZONES[zone]?.allocated)||0)+(parseInt(PARKING_ZONES[zone]?.buffer)||0);
            const startOfDay=new Date(entryDate);startOfDay.setHours(0,0,0,0);
            const endOfDay=new Date(startOfDay);endOfDay.setHours(23,59,59,999);
            const q=query(collection(db,"vehicleClearances"),where("parkingZone","==",zone),where("entryDate",">=",Timestamp.fromDate(startOfDay)),where("entryDate","<=",Timestamp.fromDate(endOfDay)));
            const snap=await getDocs(q);
            let currentCount=snap.docs.length;
            if(editingId){const existingDoc=snap.docs.find(d=>d.id===editingId);if(existingDoc)currentCount--;}
            if(currentCount+countToAdd>maxZoneCapacity){
                if(saveButton){saveButton.disabled=false;saveButton.innerHTML=editingId?'Update':'Save';}
                renderConfirmationModal('Capacity Exceeded',`Adding ${countToAdd} vehicle(s) will exceed the ${zone} Zone capacity (${maxZoneCapacity}). Override and proceed?`,()=>executeSave(form,editingId,isBatchMode,vehicleNumbers));
                return;
            }
        }catch(err){console.error("Capacity check error",err);}
    }
    await executeSave(form,editingId,isBatchMode,vehicleNumbers);
};

// ─────────────────────────────────────────
//  DELETE EXPIRED
// ─────────────────────────────────────────
const deleteExpiredClearances = async () => {
    const now=new Date();
    const expiredDocs=clearances.filter(c=>{if(!c.expiryDate)return false;const exp=c.expiryDate.toDate();exp.setHours(23,59,59,999);return exp<now;});
    const total=expiredDocs.length; if(!total)return;
    const btn=document.getElementById("delete-expired-btn");
    if(btn){btn.disabled=true;}
    showNotification(`Deleting ${total} records...`,"info");
    try{
        const chunkSize=50; let deletedCount=0;
        for(let i=0;i<total;i+=chunkSize){
            const chunk=expiredDocs.slice(i,i+chunkSize);
            await Promise.all(chunk.map(docData=>deleteDoc(doc(db,"vehicleClearances",docData.id))));
            deletedCount+=chunk.length;
            if(btn)btn.innerHTML=`Deleting... ${deletedCount}/${total}`;
            await new Promise(res=>setTimeout(res,300));
        }
        showNotification(`Deleted ${total} expired record(s).`,"success");
        renderSettingsPanel();
    }catch(err){showNotification(`Error: ${err.message}`,"error");if(btn){btn.innerHTML=`Delete ${total} Expired Record(s)`;btn.disabled=false;}}
};

// ─────────────────────────────────────────
//  ESCORT CHECKBOX
// ─────────────────────────────────────────
const handleEscortCheckboxChange = (checkbox) => {
    const form=checkbox.closest('form'); if(!form)return;
    const textarea=form.querySelector('textarea[name="notes"]'); if(!textarea)return;
    const escortText="[ Escorted by:             ]"; const escortRegex=/\[\s*Escorted\s+by:[^\]]*\]\s*/g;
    if(checkbox.checked){if(!escortRegex.test(textarea.value))textarea.value=textarea.value.trim()+(textarea.value.trim()?'\n\n':'')+escortText;}
    else{textarea.value=textarea.value.replace(escortRegex,'').trim();}
};

// ─────────────────────────────────────────
//  EVENT LISTENERS
// ─────────────────────────────────────────
document.body.addEventListener("click", async(e) => {
    const backdrop=e.target.closest('#form-modal-backdrop,#confirm-modal-backdrop,#whatsapp-modal-backdrop,#settings-backdrop,#search-modal-backdrop');
    if(backdrop&&backdrop===e.target){if(backdrop.id==='whatsapp-modal-backdrop')backdrop.remove();else document.getElementById('modal-container').innerHTML='';}
    const button=e.target.closest('button,a[id]');
    if(!button)return;
    const id=button.dataset.id||e.target.closest('details')?.dataset.id;
    try{
        if(button.classList.contains("parking-tab-btn")){activeParkingTab=button.dataset.zone;renderParkingMonitor();}
        else if(button.id==="return-today-btn"){selectedParkingDate=new Date();subscribeToParkingForDate(selectedParkingDate);}
        else if(button.id==="search-btn")renderSearchModal();
        else if(button.id==="settings-btn")renderSettingsPanel();
        else if(button.id==="close-settings-panel-btn")document.getElementById('modal-container').innerHTML='';
        else if(button.classList.contains("delete-vvip-btn"))renderConfirmationModal('Delete VVIP','Are you sure?',()=>deleteDoc(doc(db,"vvips",id)));
        else if(button.id==="delete-expired-btn")renderConfirmationModal('Delete Expired Clearances','Permanently delete ALL expired clearances? This cannot be undone.',async()=>await deleteExpiredClearances());
        else if(button.classList.contains("whatsapp-card-btn")){const clearance=clearances.find(c=>c.id===id);if(clearance)renderWhatsAppModal(clearance);}
        else if(button.id==="whatsapp-form-btn"){const form=button.closest('form'); const contact=form.querySelector('input[name="contact"]').value; if(!contact){showNotification("Enter contact number first.","error");return;} renderWhatsAppModal({ownerName:form.querySelector('input[name="ownerName"]').value,ownerContact:contact,vehicleNumber:form.querySelector('input[name="vehicleNumber"]').value,entryDate:parseLocalDate(form.querySelector('input[name="entryDate"]').value)});}
        else if(button.id==="logout-button")signOut(auth);
        else if(button.id==="add-clearance-btn")renderClearanceFormModal({},'new');
        else if(button.classList.contains("edit-btn")){const clearance=clearances.find(c=>c.id===id);if(clearance)renderClearanceFormModal(clearance,'edit');}
        else if(button.classList.contains("delete-btn"))renderConfirmationModal('Delete Clearance','Permanently delete this clearance?',async()=>{await deleteDoc(doc(db,"vehicleClearances",id));showNotification("Clearance deleted.","success");});
        else if(button.classList.contains("review-btn")){const request=clearanceRequests.find(r=>r.id===id);if(request)renderClearanceFormModal(request,'review');}
        else if(button.classList.contains("reject-request-btn"))renderRejectionModal(id);
        else if(button.classList.contains("approve-request-btn")){
            const form=button.closest('form');
            if(!form.checkValidity()){form.reportValidity();return;}
            
            const formData=getFormObj(form);

            let locationVal = formData.location;
            if (locationVal === 'Other') {
                locationVal = (formData.customLocation || '').trim();
            }
            if(!locationVal || locationVal === 'PCC'){
                showNotification("Please select a specific Parking Location before approving.", "error");
                return;
            }

            // Only enforce Parking Zone if Location is a Basement
            const isBasement = locationVal.includes('Basement');
            const pZone = formData.parkingZone || "";
            
            if(isBasement && !pZone){
                showNotification("Please select a Parking Zone for Basement locations.", "error");
                return;
            }

            button.disabled=true; button.innerHTML="Approving...";
            const originalRequest=clearanceRequests.find(r=>r.id===id);
            
            let host = formData.host_select;
            if (host === 'Others') {
                host = (formData.host_other || '').trim();
            }

            const clearancePayload={
                ownerName:formData.ownerName,
                host:host,
                ownerContact:formData.contact,
                ownerEmail:formData.email,
                vehicleNumber:formData.vehicleNumber.toUpperCase(),
                vehicleType:formData.vehicleType,
                location:locationVal,
                timeSlot:formData.timeSlot,
                entryDate:Timestamp.fromDate(parseLocalDate(formData.entryDate)),
                expiryDate:Timestamp.fromDate(parseLocalDate(formData.expiryDate)),
                parkingZone:pZone,
                createdAt:originalRequest.createdAt,
                approvedAt:Timestamp.now(),
                approvedByUsername:currentAdminProfile.username,
                notes:formData.notes||"",
                escortRequired:!!formData.escortRequired
            };

            await addDoc(collection(db,"vehicleClearances"),clearancePayload);
            
            // Save the newly updated Parking Zone and Location back into the clearanceRequests
            await updateDoc(doc(db,"clearanceRequests",id),{
                status:'approved',
                parkingZone: pZone,
                location: locationVal,
                host: host
            });
            
            const requesterEmail=formData.email||originalRequest?.requesterEmail;
            if(requesterEmail){const emailData={ownerName:formData.ownerName||originalRequest?.requesterName,vehicleNumber:clearancePayload.vehicleNumber,location:clearancePayload.location,entryDate:formatDate(clearancePayload.entryDate),expiryDate:formatDate(clearancePayload.expiryDate)}; await sendEmail(requesterEmail,`Vehicle Clearance Approved: ${clearancePayload.vehicleNumber}`,generateNotificationEmail('approved',emailData));}
            showNotification(`${clearancePayload.vehicleNumber} approved.`);
            document.getElementById('modal-container').innerHTML='';
        }
        else if(button.classList.contains("save-clearance-btn"))await handleSaveClearance(button.closest('form'),id);
        else if(button.id==="cancel-modal-btn"||button.id==="close-modal-btn")document.getElementById('modal-container').innerHTML='';
        else if(button.id==="auth-toggle-button"){authMode=authMode==='login'?'signup':'login';renderAdminLogin();}
    }catch(err){console.error("Click error:",err);showNotification(`Error: ${err.message}`,'error');const ab=document.querySelector('.approve-request-btn');if(ab){ab.disabled=false;ab.innerHTML="Approve";}}
});

document.body.addEventListener("submit", async(e) => {
    e.preventDefault();
    const form=e.target; const button=form.querySelector('button[type="submit"]');
    if(button)button.disabled=true;
    try{
        if(form.id==="parking-config-form"){
            const data=getFormObj(form);
            const ra=parseInt(data.redAllocated),rb=parseInt(data.redBuffer),wa=parseInt(data.whiteAllocated),wb=parseInt(data.whiteBuffer);
            if(ra+rb>30||wa+wb>30){showNotification("Total capacity cannot exceed 30 lots per zone.","error");return;}
            await setDoc(doc(db,"publicConfig","parkingSettings"),{Red:{allocated:ra,buffer:rb},White:{allocated:wa,buffer:wb}});
            showNotification("Parking configuration saved!");
        }
        else if(form.id==="search-form"){
            const data=getFormObj(form); const searchTerm=data.searchTerm.toUpperCase().trim(); if(!searchTerm)return;
            const q=query(collection(db,"vehicleClearances"),where("vehicleNumber",">=",searchTerm),where("vehicleNumber","<=",searchTerm+'\uf8ff'));
            const querySnapshot=await getDocs(q);
            const results=querySnapshot.docs.map(doc=>({id:doc.id,...doc.data()}));
            document.getElementById('search-results-section').style.display='block';
            renderClearancesList(results);
            document.getElementById('modal-container').innerHTML='';
        }
        else if(form.id==="add-vvip-form"){
            const data=getFormObj(form);
            await addDoc(collection(db,"vvips"),{vehicleNumber:data.vehicleNumber.toUpperCase(),designation:data.designation});
            form.reset(); showNotification("VVIP registered.");
        }
        else if(form.id==="auth-form"){
            const data=getFormObj(form);
            if(authMode==='login'){const q=query(collection(db,"admins"),where("username","==",data.username));const snap=await getDocs(q);if(snap.empty)throw new Error("Invalid credentials.");await signInWithEmailAndPassword(auth,snap.docs[0].data().email,data.password);}
            else{if(data.inviteCode!==ADMIN_INVITE_CODE)throw new Error("Invalid invite code.");const user=await createUserWithEmailAndPassword(auth,data.email,data.password);await setDoc(doc(db,"admins",user.user.uid),{email:data.email,username:data.username,designation:data.designation});}
        }
    }catch(err){showNotification(`Error: ${err.message}`,'error');}finally{if(button)button.disabled=false;}
});

document.body.addEventListener("reset",(e)=>{ if(e.target.id==='search-form'){document.getElementById('search-results-section').style.display='none';document.getElementById('search-results-list').innerHTML='';} });

document.body.addEventListener("change",(e)=>{
    const target=e.target;
    if(target.id==='parking-date-selector'){selectedParkingDate=parseLocalDate(target.value)||new Date();subscribeToParkingForDate(selectedParkingDate);}
    else if(target.name==="location"){
        const form=target.closest('form');
        const customInput=form.querySelector('input[name="customLocation"]');
        if(customInput){customInput.style.display=target.value==='Other'?'block':'none';customInput.required=target.value==='Other';}
        
        const zoneSelect=form.querySelector('select[name="parkingZone"]');
        if(zoneSelect){
            if(target.value.includes('Basement')){
                zoneSelect.disabled=false;
                zoneSelect.style.opacity='1';
                zoneSelect.style.cursor='pointer';
            }else{
                zoneSelect.disabled=true;
                zoneSelect.value='';
                zoneSelect.style.opacity='0.5';
                zoneSelect.style.cursor='not-allowed';
            }
        }
    }
    else if(target.name==="host_select"){const form=target.closest('form');const customInput=form.querySelector('input[name="host_other"]');if(customInput){customInput.style.display=target.value==='Others'?'block':'none';customInput.required=target.value==='Others';}}
    else if(target.name==="escortRequired")handleEscortCheckboxChange(target);
});

</script>
